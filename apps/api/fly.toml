app = "phronesisip"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  DEBUG = "false"
  # DATABASE_URL = "postgresql+asyncpg://DB_USER:DB_PASS@HOST:PORT/DB_NAME"
  # CLERK_SECRET_KEY = ""
  # CLERK_JWKS_URL = ""
  # CLERK_ISSUER = ""
  # REDIS_URL = ""
  # SENTRY_DSN = ""

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
